<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naomi | Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      /* Very soft pastel yellow-to-pink background */
      background: linear-gradient(135deg, #fffdf2 0%, #fef5f9 100%);
      background-color: #fffdf2;
      color: #555555;
      line-height: 1.6;
    }

    /* Navigation */
    header {
      background-color: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(203, 170, 203, 0.1); /* subtle purple shadow */
    }
    nav {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #cbaacb; /* Pastel purple */
      text-shadow: 2px 2px 0px #fdfd96; /* Pastel yellow shadow */
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      text-decoration: none;
      color: #888;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .nav-links a:hover {
      color: #ffafcc; /* Pastel pink */
    }

    /* Hero Section */
    .hero {
      text-align: center;
      padding: 80px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* Prettier Image Shape & Outline */
    .hero img {
      /* Organic "blob" shape */
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      /* Pastel yellow outline color */
      border: 6px solid #fdfd96;
      box-shadow: 0 10px 30px rgba(253, 253, 150, 0.8);
      margin-bottom: 30px;
      transition: all 0.5s ease-in-out;
      animation: float 6s ease-in-out infinite;
    }
    .hero img:hover {
      border-radius: 50%;
      border-color: #cbaacb; /* Pastel purple on hover */
      box-shadow: 0 10px 30px rgba(203, 170, 203, 0.6);
      transform: translateY(-5px);
    }

    /* Floating Animation for the image */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.8rem;
      color: #444;
      margin-bottom: 20px;
    }
    .highlight {
      color: #cbaacb; /* Pastel purple */
    }

    .hero p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto 30px;
      color: #6c757d;
    }

    /* Pastel Button */
    .btn-primary {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(45deg, #ffafcc, #cbaacb); /* Pastel pink to purple */
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 6px 15px rgba(203, 170, 203, 0.4);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(45deg, #cbaacb, #ffafcc); /* Reverses on hover */
      box-shadow: 0 8px 20px rgba(255, 175, 204, 0.6);
      transform: translateY(-3px);
    }

    /* Projects Section */
    #projects {
      padding: 80px 20px;
      max-width: 1000px;
      margin: 0 auto;
      text-align: center;
    }
    #projects h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      color: #cbaacb; /* Pastel purple */
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
